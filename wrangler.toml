name = "course-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "courses_db"
# IMPORTANT: Run 'wrangler d1 create courses_db' and replace the ID below
database_id = "REPLACE_WITH_YOUR_DB_ID"

# R2 Bucket Binding
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "course-files"

# KV Namespace Binding
[[kv_namespaces]]
binding = "SESSIONS"
# IMPORTANT: Run 'wrangler kv:namespace create SESSIONS' and replace the ID below
id = "REPLACE_WITH_YOUR_KV_ID"

[vars]
# Environment variables (public)
ENVIRONMENT = "dev"
